name: Deploy to Hostinger via FTP

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Upload all files (not just changed)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Upload files via lftp
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          FULL_SYNC="${{ inputs.full_sync || 'false' }}"

          if [ "$FULL_SYNC" = "true" ]; then
            echo "Full sync — uploading all files"
            FILES=$(find . -type f \
              ! -path './.git/*' \
              ! -path './.github/*' \
              ! -path './.claude/*' \
              ! -path './node_modules/*' \
              | sed 's|^\./||')
          else
            echo "Incremental — uploading changed files only"
            FILES=$(git diff --name-only HEAD~1 HEAD \
              | grep -v '^\.\(git\|github\|claude\)' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No files to deploy."
            exit 0
          fi

          echo "Deploying $(echo "$FILES" | wc -l) files:"
          echo "$FILES"

          # Build lftp commands
          CMDS=""
          for f in $FILES; do
            if [ -f "$f" ]; then
              DIR=$(dirname "$f")
              if [ "$DIR" != "." ]; then
                CMDS="$CMDS mkdir -p /public_html/$DIR;"
              fi
              CMDS="$CMDS put -O /public_html/$([ "$DIR" = "." ] && echo "" || echo "$DIR/") $f;"
            fi
          done

          lftp -e "
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            set ftp:passive-mode yes;
            open $FTP_HOST;
            user $FTP_USER $FTP_PASS;
            $CMDS
            quit;
          "

          echo "Done — deployed $(echo "$FILES" | wc -l) files."
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
